<!DOCTYPE html>
<html>
<head>
    <title>Audio Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        audio {
            width: 100%;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h2>Audio Player</h2>
    
    <audio id="audioPlayer" controls>
        Your browser does not support the audio element.
    </audio>
    
    <script>
        // 设置音频源
        document.getElementById('audioPlayer').src = '/audio.m4a';
        
        var audio = document.getElementById('audioPlayer');
    </script>
</body>
</html>
