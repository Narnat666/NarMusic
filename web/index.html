<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐下载器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: #2c3e50;
            color: white;
            padding: 25px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 30px;
        }
        
        .input-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 16px;
        }
        
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            min-height: 150px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        button {
            flex: 1;
            padding: 16px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        button i {
            font-size: 18px;
        }
        
        #sendBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        #sendBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        #sendBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        #clearBtn {
            background: #f5f5f5;
            color: #666;
            border: 2px solid #e0e0e0;
        }
        
        #clearBtn:hover {
            background: #e0e0e0;
        }
        
        /* 任务信息区域 */
        .task-info-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid #17a2b8;
        }
        
        .task-info-content {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        
        .status-item {
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .status-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        
        .status-label {
            font-weight: 600;
            color: #555;
        }
        
        .status-value {
            font-family: monospace;
            font-weight: bold;
        }
        
        .status-downloading {
            color: #007bff;
        }
        
        .status-idle {
            color: #6c757d;
        }
        
        .status-error {
            color: #dc3545;
        }
        
        .status-success {
            color: #28a745;
        }
        
        /* 进度条样式 */
        .progress-container {
            margin-top: 15px;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background-color: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            width: 0%;
            transition: width 0.5s ease;
            position: absolute;
            left: 0;
            top: 0;
        }
        
        /* 不确定进度时的动画 */
        .progress-bar.indeterminate .progress-fill {
            background: linear-gradient(90deg, #4caf50 25%, #8bc34a 50%, #4caf50 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
            width: 100%;
            opacity: 0.7;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .progress-text {
            text-align: center;
            margin-top: 8px;
            font-family: monospace;
            font-size: 14px;
            color: #333;
            display: flex;
            justify-content: space-between;
        }
        
        .task-id {
            font-family: monospace;
            background: #f0f0f0;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 5px;
        }
        
        /* 响应区域 */
        .response-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
        }
        
        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .response-header h3 {
            color: #2c3e50;
        }
        
        #copyBtn {
            background: #28a745;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
        }
        
        #copyBtn:hover {
            background: #218838;
        }
        
        #responseContent {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            min-height: 80px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
            color: #333;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            display: none;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .server-info {
            background: #e8f4fd;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            border-left: 4px solid #2196f3;
        }
        
        .server-info h3 {
            color: #1976d2;
            margin-bottom: 10px;
        }
        
        .server-info p {
            color: #555;
            line-height: 1.6;
        }
        
        @media (max-width: 600px) {
            .container {
                border-radius: 10px;
            }
            
            .content {
                padding: 20px;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .progress-text {
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 音乐下载器</h1>
            <p>粘贴音乐链接，实时查看下载进度</p>
        </div>
        
        <div class="content">
            <div class="input-group">
                <label for="contentInput">
                    <i class="fas fa-music"></i> 音乐下载链接：
                </label>
                <textarea 
                    id="contentInput" 
                    placeholder="在这里粘贴音乐下载链接...&#10;例如：http://example.com/music.mp3"
                    autofocus
                ></textarea>
            </div>
            
            <div class="button-group">
                <button id="sendBtn">
                    <i class="fas fa-download"></i> 开始下载
                </button>
                <button id="clearBtn">
                    <i class="fas fa-eraser"></i> 清空链接
                </button>
            </div>
            
            <!-- 任务信息区域 -->
            <div class="task-info-section">
                <div class="response-header">
                    <h3><i class="fas fa-chart-line"></i> 下载状态</h3>
                    <div class="task-id" id="taskIdDisplay">当前任务ID: 无</div>
                </div>
                <div class="task-info-content">
                    <div class="status-item">
                        <span class="status-label">任务ID:</span>
                        <span id="taskId" class="status-value">-</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">下载状态:</span>
                        <span id="downloadStatus" class="status-value status-idle">等待中</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">下载进度:</span>
                        <span id="downloadProgress" class="status-value">0%</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">已下载:</span>
                        <span id="downloadedBytes" class="status-value">0 MB</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">下载速度:</span>
                        <span id="downloadSpeed" class="status-value">0 MB/s</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">任务状态:</span>
                        <span id="taskStatus" class="status-value">未开始</span>
                    </div>
                    
                    <div class="progress-container">
                        <div class="progress-bar" id="progressBar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <div class="progress-text">
                            <span id="progressText">等待开始下载</span>
                            <span id="speedText">速度: 0 MB/s</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="status" id="statusMessage"></div>
            
            <div class="response-section">
                <div class="response-header">
                    <h3><i class="fas fa-server"></i> 服务器响应</h3>
                    <button id="copyBtn">
                        <i class="far fa-copy"></i> 复制响应
                    </button>
                </div>
                <div id="responseContent">
                    等待发送请求...
                </div>
            </div>
            
            <div class="server-info">
                <h3><i class="fas fa-info-circle"></i> 使用说明</h3>
                <p>
                    • 粘贴有效的音乐下载链接到上方输入框<br>
                    • 点击"开始下载"按钮开始下载任务<br>
                    • 实时查看下载状态和进度<br>
                    • 支持显示已下载大小和下载速度<br>
                    • 下载完成后会显示完整响应<br>
                    • 状态每秒钟自动更新
                </p>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let pollingInterval = null;
        let currentTaskId = null;
        let lastDownloadedBytes = 0;
        let lastSpeedUpdateTime = Date.now();
        let lastSpeedBytes = 0;
        let speedHistory = [];
        const MAX_SPEED_HISTORY = 5;
        
        document.addEventListener('DOMContentLoaded', function() {
            const contentInput = document.getElementById('contentInput');
            const sendBtn = document.getElementById('sendBtn');
            const clearBtn = document.getElementById('clearBtn');
            const copyBtn = document.getElementById('copyBtn');
            const responseContent = document.getElementById('responseContent');
            const statusMessage = document.getElementById('statusMessage');
            
            // 任务信息元素
            const taskIdEl = document.getElementById('taskId');
            const taskIdDisplayEl = document.getElementById('taskIdDisplay');
            const downloadStatusEl = document.getElementById('downloadStatus');
            const downloadProgressEl = document.getElementById('downloadProgress');
            const downloadedBytesEl = document.getElementById('downloadedBytes');
            const downloadSpeedEl = document.getElementById('downloadSpeed');
            const taskStatusEl = document.getElementById('taskStatus');
            const progressBarEl = document.getElementById('progressBar');
            const progressFillEl = document.getElementById('progressFill');
            const progressTextEl = document.getElementById('progressText');
            const speedTextEl = document.getElementById('speedText');
            
            // 格式化字节大小为可读格式
            function formatBytes(bytes) {
                if (bytes === 0 || bytes === undefined) return '0 B';
                
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                
                if (i === 0) return bytes + ' ' + sizes[i];
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }
            
            // 格式化速度
            function formatSpeed(bytesPerSecond) {
                if (bytesPerSecond === 0) return '0 B/s';
                
                const k = 1024;
                const sizes = ['B/s', 'KB/s', 'MB/s'];
                const i = Math.floor(Math.log(bytesPerSecond) / Math.log(k));
                
                if (i >= sizes.length) i = sizes.length - 1;
                if (i === 0) return bytesPerSecond + ' ' + sizes[i];
                return parseFloat((bytesPerSecond / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }
            
            // 开始轮询下载状态
            function startPollingTaskStatus() {
                if (pollingInterval) {
                    clearInterval(pollingInterval);
                }
                
                console.log('开始轮询任务状态，task_id:', currentTaskId);
                
                pollingInterval = setInterval(async () => {
                    if (!currentTaskId) {
                        console.warn('没有任务ID，停止轮询');
                        stopPolling();
                        return;
                    }
                    
                    try {
                        const response = await fetch(`/api/download/status?task_id=${currentTaskId}`, {
                            method: 'GET',
                            headers: {
                                'Content-Type': 'application/json',
                                'Cache-Control': 'no-cache'
                            }
                        });
                        
                        if (response.ok) {
                            const status = await response.json();
                            console.log('收到状态更新:', status);
                            updateTaskStatus(status);
                        } else {
                            console.error('获取下载状态失败:', response.status);
                            const errorText = await response.text();
                            console.error('错误详情:', errorText);
                            
                            // 如果是404，可能是任务不存在
                            if (response.status === 404) {
                                showStatus('任务不存在或已过期', 'error');
                                stopPolling();
                            }
                        }
                    } catch (error) {
                        console.error('轮询错误:', error);
                        // 网络错误时继续尝试，不停止轮询
                    }
                }, 1000); // 每秒轮询一次
            }
            
            // 更新任务状态显示
            function updateTaskStatus(status) {
                // 更新任务ID
                taskIdEl.textContent = status.task_id || '-';
                
                // 更新任务状态显示
                if (status.error) {
                    // 错误状态
                    downloadStatusEl.textContent = '错误: ' + status.error;
                    downloadStatusEl.className = 'status-value status-error';
                    taskStatusEl.textContent = '错误';
                    stopPolling();
                    return;
                }
                
                // 根据后端返回的状态更新UI
                if (status.is_downloading) {
                    downloadStatusEl.textContent = '下载中...';
                    downloadStatusEl.className = 'status-value status-downloading';
                    taskStatusEl.textContent = '下载中';
                    
                    // 显示不确定进度动画
                    progressBarEl.classList.add('indeterminate');
                } else if (status.is_finished) {
                    downloadStatusEl.textContent = '下载完成';
                    downloadStatusEl.className = 'status-value status-success';
                    taskStatusEl.textContent = '已完成';
                    
                    // 移除不确定进度动画
                    progressBarEl.classList.remove('indeterminate');
                    
                    if (status.is_success) {
                        taskStatusEl.textContent = '下载成功';
                        progressFillEl.style.width = '100%';
                        downloadProgressEl.textContent = '100%';
                        progressTextEl.textContent = '下载完成: 100%';
                    } else {
                        taskStatusEl.textContent = '下载失败';
                        progressFillEl.style.backgroundColor = '#dc3545';
                        progressFillEl.style.width = '100%';
                    }
                    
                    // 下载完成后停止轮询
                    setTimeout(() => {
                        stopPolling();
                    }, 3000); // 3秒后停止轮询
                } else {
                    downloadStatusEl.textContent = '等待开始';
                    downloadStatusEl.className = 'status-value status-idle';
                    taskStatusEl.textContent = '准备中';
                }
                
                // 更新已下载字节数
                const downloadedBytes = status.downloaded_bytes || 0;
                downloadedBytesEl.textContent = formatBytes(downloadedBytes);
                
                // 计算下载速度
                const now = Date.now();
                const timeDiff = (now - lastSpeedUpdateTime) / 1000; // 转换为秒
                
                if (timeDiff >= 1) { // 每秒计算一次速度
                    const bytesDiff = downloadedBytes - lastSpeedBytes;
                    const speed = bytesDiff / timeDiff;
                    
                    // 保存到速度历史记录
                    speedHistory.push(speed);
                    if (speedHistory.length > MAX_SPEED_HISTORY) {
                        speedHistory.shift();
                    }
                    
                    // 计算平均速度
                    const avgSpeed = speedHistory.reduce((sum, val) => sum + val, 0) / speedHistory.length;
                    
                    downloadSpeedEl.textContent = formatSpeed(avgSpeed);
                    speedTextEl.textContent = `速度: ${formatSpeed(avgSpeed)}`;
                    
                    lastSpeedBytes = downloadedBytes;
                    lastSpeedUpdateTime = now;
                    
                    // 更新进度显示（如果没有总大小，显示已下载大小）
                    progressTextEl.textContent = `已下载: ${formatBytes(downloadedBytes)}`;
                }
                
                // 更新进度百分比（基于已下载字节数，如果没有总大小，显示不确定进度）
                // 这里我们使用一个模拟的进度，基于时间或已下载大小
                if (status.is_downloading) {
                    // 如果是下载中但没有总大小，我们显示一个动态的进度
                    const elapsedTime = (now - lastSpeedUpdateTime + timeDiff * 1000) / 1000;
                    const simulatedProgress = Math.min(95, (elapsedTime % 30) * 3); // 30秒循环
                    downloadProgressEl.textContent = Math.floor(simulatedProgress) + '%';
                }
                
                lastDownloadedBytes = downloadedBytes;
            }
            
            // 停止轮询
            function stopPolling() {
                if (pollingInterval) {
                    clearInterval(pollingInterval);
                    pollingInterval = null;
                    console.log('停止轮询');
                }
            }
            
            // 重置任务状态显示
            function resetTaskStatus() {
                taskIdEl.textContent = '-';
                taskIdDisplayEl.textContent = '当前任务ID: 无';
                downloadStatusEl.textContent = '等待中';
                downloadStatusEl.className = 'status-value status-idle';
                downloadProgressEl.textContent = '0%';
                downloadedBytesEl.textContent = '0 B';
                downloadSpeedEl.textContent = '0 B/s';
                taskStatusEl.textContent = '未开始';
                
                progressBarEl.classList.remove('indeterminate');
                progressFillEl.style.width = '0%';
                progressFillEl.style.backgroundColor = '';
                progressTextEl.textContent = '等待开始下载';
                speedTextEl.textContent = '速度: 0 B/s';
                
                lastDownloadedBytes = 0;
                lastSpeedBytes = 0;
                lastSpeedUpdateTime = Date.now();
                speedHistory = [];
            }
            
            // 发送内容到服务器
            sendBtn.addEventListener('click', async function() {
                const content = contentInput.value.trim();
                
                if (!content) {
                    showStatus('请输入或粘贴下载链接！', 'error');
                    return;
                }
                
                if (!content.startsWith('http://') && !content.startsWith('https://')) {
                    showStatus('请输入有效的http或https链接！', 'error');
                    return;
                }
                
                // 重置状态
                resetTaskStatus();
                showStatus('正在开始下载任务...', 'success');
                
                sendBtn.disabled = true;
                sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发送中...';
                
                try {
                    const response = await fetch('/api/message', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            content: content
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        // 保存任务ID
                        currentTaskId = data.task_id;
                        taskIdEl.textContent = currentTaskId;
                        taskIdDisplayEl.textContent = `当前任务ID: ${currentTaskId.substring(0, 15)}...`;
                        
                        showStatus('下载任务已创建，开始监控进度...', 'success');
                        responseContent.textContent = JSON.stringify(data, null, 2);
                        
                        // 更新状态为准备中
                        downloadStatusEl.textContent = '准备中...';
                        downloadStatusEl.className = 'status-value status-downloading';
                        taskStatusEl.textContent = '任务创建成功';
                        
                        // 开始轮询下载状态
                        setTimeout(() => {
                            startPollingTaskStatus();
                        }, 500); // 延迟500ms开始轮询，给服务器一些时间
                    } else {
                        showStatus(`下载失败: ${data.error || '未知错误'}`, 'error');
                        responseContent.textContent = JSON.stringify(data, null, 2);
                        downloadStatusEl.textContent = '任务创建失败';
                        downloadStatusEl.className = 'status-value status-error';
                    }
                } catch (error) {
                    showStatus(`连接错误: ${error.message}`, 'error');
                    responseContent.textContent = `连接错误：${error.message}\n\n请确保服务器正在运行！`;
                    downloadStatusEl.textContent = '连接错误';
                    downloadStatusEl.className = 'status-value status-error';
                } finally {
                    sendBtn.disabled = false;
                    sendBtn.innerHTML = '<i class="fas fa-download"></i> 开始下载';
                }
            });
            
            // 清空内容
            clearBtn.addEventListener('click', function() {
                contentInput.value = '';
                responseContent.textContent = '等待发送请求...';
                statusMessage.style.display = 'none';
                contentInput.focus();
                stopPolling();
                resetTaskStatus();
                currentTaskId = null;
                showStatus('内容已清空', 'success');
            });
            
            // 复制响应内容
            copyBtn.addEventListener('click', function() {
                const text = responseContent.textContent;
                if (text && text !== '等待发送请求...') {
                    navigator.clipboard.writeText(text)
                        .then(() => {
                            const originalText = copyBtn.innerHTML;
                            copyBtn.innerHTML = '<i class="fas fa-check"></i> 已复制';
                            copyBtn.style.background = '#28a745';
                            setTimeout(() => {
                                copyBtn.innerHTML = originalText;
                                copyBtn.style.background = '';
                            }, 2000);
                        })
                        .catch(err => {
                            console.error('复制失败:', err);
                            showStatus('复制失败，请手动复制', 'error');
                        });
                } else {
                    showStatus('没有内容可复制', 'error');
                }
            });
            
            // 显示状态消息
            function showStatus(message, type) {
                statusMessage.textContent = message;
                statusMessage.className = `status ${type}`;
                statusMessage.style.display = 'block';
                
                // 3秒后自动隐藏
                setTimeout(() => {
                    statusMessage.style.display = 'none';
                }, 3000);
            }
            
            // 页面加载完成后显示欢迎信息
            setTimeout(() => {
                showStatus('欢迎使用音乐下载器！请粘贴音乐链接开始下载', 'success');
            }, 1000);
            
            // 页面卸载时停止轮询
            window.addEventListener('beforeunload', function() {
                stopPolling();
            });
            
            // 添加键盘快捷键支持
            contentInput.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.key === 'Enter') {
                    sendBtn.click();
                }
            });
        });
    </script>
</body>
</html>
