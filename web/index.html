<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B站视频音乐提取器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="theme-controls">
                <button class="theme-btn" id="themeToggle">🌙</button>
                <button class="theme-btn" id="paletteToggle">🎨</button>
            </div>
            <div class="theme-selector" id="themeSelector">
                <div class="theme-color active" data-theme="default" style="background: linear-gradient(135deg, #667eea, #764ba2);"></div>
                <div class="theme-color" data-theme="sunset" style="background: linear-gradient(135deg, #fd746c, #ff9068);"></div>
                <div class="theme-color" data-theme="forest" style="background: linear-gradient(135deg, #11998e, #38ef7d);"></div>
                <div class="theme-color" data-theme="purple" style="background: linear-gradient(135deg, #8E2DE2, #4A00E0);"></div>
            </div>
            <h1><i class="fas fa-music"></i> B站视频音乐提取器</h1>
        </div>
        
        <div class="content">
            <!-- 输入区域 -->
            <div class="form-group">
                <label for="urlInput">
                    <i class="fas fa-link"></i> 音乐链接
                </label>
                <textarea 
                    id="urlInput" 
                    placeholder="输入B站视频链接"
                    rows="3"
                ></textarea>
            </div>
            
            <div class="form-group">
                <label for="filenameInput">
                    <i class="fas fa-file-alt"></i> 文件名
                </label>
                <input 
                    type="text" 
                    id="filenameInput" 
                    placeholder="输入要保存的文件名"
                >
            </div>
            
            <!-- 主按钮区域 -->
            <div class="btn-group">
                <button class="btn" id="sendBtn">
                    <i class="fas fa-download"></i> 开始下载
                </button>
                <button class="btn btn-secondary" id="clearBtn">
                    <i class="fas fa-eraser"></i> 清空输入
                </button>
            </div>
            
            <!-- 本地下载按钮 -->
            <button class="btn" id="localDownloadBtn" disabled>
                <i class="fas fa-file-download"></i> 保存到本地
            </button>
            
            <!-- 进度条 -->
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <!-- 状态显示区域 -->
            <div class="status-section" id="statusSection">
                <div class="status-header">
                    <h3><i class="fas fa-chart-line"></i> 下载状态</h3>
                    <div class="light" id="statusLight"></div>
                </div>
                
                <div class="status-grid">
                    <div class="status-card">
                        <div class="status-label">
                            <i class="fas fa-database"></i> 已下载
                        </div>
                        <div id="downloadedBytes" class="status-value">0 MB</div>
                    </div>
                    
                    <div class="status-card">
                        <div class="status-label">
                            <i class="fas fa-tachometer-alt"></i> 下载速度
                        </div>
                        <div id="downloadSpeed" class="status-value">0 MB/s</div>
                    </div>
                    
                    <div class="status-card">
                        <div class="status-label">
                            <i class="fas fa-info-circle"></i> 任务状态
                        </div>
                        <div id="taskStatus" class="status-value">等待中</div>
                    </div>
                </div>
                
                <!-- 文件信息区域 -->
                <div class="file-info" id="fileInfo">
                    <div class="file-info-header">
                        <i class="fas fa-file-audio"></i>
                        <h4>文件信息</h4>
                    </div>
                    <div class="file-info-grid">
                        <div class="file-info-item">
                            <div class="file-info-label">
                                <i class="fas fa-file-signature"></i> 文件名
                            </div>
                            <div class="file-info-value" id="fileName">-</div>
                        </div>
                        <div class="file-info-item">
                            <div class="file-info-label">
                                <i class="fas fa-weight-hanging"></i> 文件大小
                            </div>
                            <div class="file-info-value" id="fileSize">-</div>
                        </div>
                        <div class="file-info-item">
                            <div class="file-info-label">
                                <i class="fas fa-clock"></i> 下载时间
                            </div>
                            <div class="file-info-value" id="downloadTime">-</div>
                        </div>
                        <div class="file-info-item">
                            <div class="file-info-label">
                                <i class="fas fa-check-circle"></i> 下载状态
                            </div>
                            <div class="file-info-value" id="downloadStatus">-</div>
                        </div>
                    </div>
                </div>
                
                <!-- 状态消息 -->
                <div class="status-message" id="statusMessage"></div>
            </div>
        </div>
    </div>

    <div class="floating-animation" id="scrollTop" title="回到顶部">
        ↑
    </div>

    <script src="js/app.js"></script>
</body>
</html>
