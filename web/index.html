<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐下载器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(to right, #2c3e50, #34495e);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 16px;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.5;
        }
        
        .content {
            padding: 40px;
        }
        
        /* 输入区域 */
        .input-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 2px solid #e9ecef;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group:last-child {
            margin-bottom: 0;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        input[type="text"], input[type="url"] {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus, input[type="url"]:focus {
            outline: none;
            border-color: #6a11cb;
            box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.1);
        }
        
        .input-hint {
            margin-top: 8px;
            font-size: 14px;
            color: #6c757d;
            font-style: italic;
        }
        
        /* 按钮区域 */
        .button-group {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        button {
            flex: 1;
            padding: 18px 24px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        button i {
            font-size: 20px;
        }
        
        #sendBtn {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
        }
        
        #sendBtn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(106, 17, 203, 0.3);
        }
        
        #sendBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        #clearBtn {
            background: #f8f9fa;
            color: #495057;
            border: 2px solid #e9ecef;
        }
        
        #clearBtn:hover {
            background: #e9ecef;
        }
        
        /* 状态显示区域 */
        .status-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            border: 2px solid #e9ecef;
        }
        
        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .status-header h3 {
            color: #2c3e50;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        /* 状态灯 */
        .status-light {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .light-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .light-label {
            font-size: 14px;
            font-weight: 600;
            color: #495057;
        }
        
        .light {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #e9ecef;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        
        .light::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.2);
        }
        
        .light.red {
            background-color: #dc3545;
            box-shadow: 0 0 20px rgba(220, 53, 69, 0.5);
        }
        
        .light.yellow {
            background-color: #ffc107;
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.5);
        }
        
        .light.green {
            background-color: #28a745;
            box-shadow: 0 0 20px rgba(40, 167, 69, 0.5);
        }
        
        .light.active {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.9; }
            50% { opacity: 1; }
            100% { opacity: 0.9; }
        }
        
        /* 状态信息 */
        .status-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .status-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e9ecef;
        }
        
        .status-item-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .status-item-header i {
            font-size: 20px;
            color: #6a11cb;
        }
        
        .status-item-header h4 {
            color: #2c3e50;
            font-size: 18px;
        }
        
        .status-item-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status-value {
            font-family: 'Courier New', monospace;
            font-size: 20px;
            font-weight: 700;
            color: #495057;
        }
        
        /* 响应区域 */
        .response-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-top: 30px;
            border: 2px solid #e9ecef;
        }
        
        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .response-header h3 {
            color: #2c3e50;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        #copyBtn {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
        }
        
        #copyBtn:hover {
            background: #218838;
        }
        
        #responseContent {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e9ecef;
            min-height: 100px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            word-break: break-word;
            color: #333;
            font-size: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        /* 状态消息 */
        .status-message {
            margin-top: 20px;
            padding: 15px 20px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            display: none;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status-message.info {
            background: #cce5ff;
            color: #004085;
            border: 1px solid #b8daff;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                border-radius: 15px;
            }
            
            .content {
                padding: 25px;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .status-info {
                grid-template-columns: 1fr;
            }
            
            .status-light {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
            
            .light-container {
                flex-direction: row;
                gap: 15px;
            }
        }
        
        @media (max-width: 480px) {
            .header {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 26px;
            }
            
            .content {
                padding: 20px;
            }
            
            .input-section, .status-section, .response-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-music"></i> 音乐下载器</h1>
            <p>输入音乐链接和自定义文件名，实时监控下载状态</p>
        </div>
        
        <div class="content">
            <!-- 输入区域 -->
            <div class="input-section">
                <div class="input-group">
                    <label for="urlInput">
                        <i class="fas fa-link"></i> 音乐下载链接
                    </label>
                    <input 
                        type="url" 
                        id="urlInput" 
                        placeholder="请输入音乐下载链接，例如：https://example.com/music.mp3"
                        autofocus
                    >
                    <div class="input-hint">请确保链接以 http:// 或 https:// 开头</div>
                </div>
                
                <div class="input-group">
                    <label for="filenameInput">
                        <i class="fas fa-file-alt"></i> 自定义文件名
                    </label>
                    <input 
                        type="text" 
                        id="filenameInput" 
                        placeholder="请输入文件名（无需后缀），例如：my_music"
                    >
                    <div class="input-hint">下载的文件将以此名称保存，不包含文件扩展名</div>
                </div>
            </div>
            
            <!-- 按钮区域 -->
            <div class="button-group">
                <button id="sendBtn">
                    <i class="fas fa-download"></i> 开始下载
                </button>
                <button id="clearBtn">
                    <i class="fas fa-eraser"></i> 清空所有
                </button>
            </div>
            
            <!-- 状态显示区域 -->
            <div class="status-section">
                <div class="status-header">
                    <h3><i class="fas fa-chart-bar"></i> 下载状态</h3>
                    <div class="status-light">
                        <div class="light-container">
                            <div class="light" id="statusLight"></div>
                            <div class="light-label" id="statusLabel">等待开始</div>
                        </div>
                    </div>
                </div>
                
                <div class="status-info">
                    <div class="status-item">
                        <div class="status-item-header">
                            <i class="fas fa-tasks"></i>
                            <h4>任务ID</h4>
                        </div>
                        <div class="status-item-content">
                            <span id="taskId" class="status-value">-</span>
                        </div>
                    </div>
                    
                    <div class="status-item">
                        <div class="status-item-header">
                            <i class="fas fa-database"></i>
                            <h4>已下载大小</h4>
                        </div>
                        <div class="status-item-content">
                            <span id="downloadedBytes" class="status-value">0 MB</span>
                        </div>
                    </div>
                    
                    <div class="status-item">
                        <div class="status-item-header">
                            <i class="fas fa-tachometer-alt"></i>
                            <h4>下载速度</h4>
                        </div>
                        <div class="status-item-content">
                            <span id="downloadSpeed" class="status-value">0 MB/s</span>
                        </div>
                    </div>
                    
                    <div class="status-item">
                        <div class="status-item-header">
                            <i class="fas fa-clock"></i>
                            <h4>任务状态</h4>
                        </div>
                        <div class="status-item-content">
                            <span id="taskStatus" class="status-value">未开始</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 状态消息 -->
            <div class="status-message" id="statusMessage"></div>
            
            <!-- 响应区域 -->
            <div class="response-section">
                <div class="response-header">
                    <h3><i class="fas fa-server"></i> 服务器响应</h3>
                    <button id="copyBtn">
                        <i class="far fa-copy"></i> 复制响应
                    </button>
                </div>
                <div id="responseContent">
                    等待发送请求...
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let pollingInterval = null;
        let currentTaskId = null;
        let lastDownloadedBytes = 0;
        let lastSpeedUpdateTime = Date.now();
        let lastSpeedBytes = 0;
        let speedHistory = [];
        const MAX_SPEED_HISTORY = 5;
        
        document.addEventListener('DOMContentLoaded', function() {
            const urlInput = document.getElementById('urlInput');
            const filenameInput = document.getElementById('filenameInput');
            const sendBtn = document.getElementById('sendBtn');
            const clearBtn = document.getElementById('clearBtn');
            const copyBtn = document.getElementById('copyBtn');
            const responseContent = document.getElementById('responseContent');
            const statusMessage = document.getElementById('statusMessage');
            
            // 状态灯相关元素
            const statusLight = document.getElementById('statusLight');
            const statusLabel = document.getElementById('statusLabel');
            
            // 状态信息元素
            const taskIdEl = document.getElementById('taskId');
            const downloadedBytesEl = document.getElementById('downloadedBytes');
            const downloadSpeedEl = document.getElementById('downloadSpeed');
            const taskStatusEl = document.getElementById('taskStatus');
            
            // 更新状态灯
            function updateStatusLight(status, isActive = false) {
                // 移除所有可能的状态类
                statusLight.classList.remove('red', 'yellow', 'green', 'active');
                
                // 根据状态设置灯的颜色
                switch(status) {
                    case 'error':
                        statusLight.classList.add('red');
                        statusLabel.textContent = '下载失败';
                        break;
                    case 'downloading':
                        statusLight.classList.add('yellow');
                        statusLabel.textContent = '下载中';
                        break;
                    case 'success':
                        statusLight.classList.add('green');
                        statusLabel.textContent = '下载完成';
                        break;
                    case 'idle':
                    default:
                        statusLight.classList.remove('red', 'yellow', 'green');
                        statusLabel.textContent = '等待开始';
                        break;
                }
                
                // 如果状态活跃（如下载中），添加脉冲动画
                if (isActive) {
                    statusLight.classList.add('active');
                }
            }
            
            // 格式化字节大小为可读格式
            function formatBytes(bytes) {
                if (bytes === 0 || bytes === undefined) return '0 B';
                
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                
                if (i === 0) return bytes + ' ' + sizes[i];
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }
            
            // 格式化速度
            function formatSpeed(bytesPerSecond) {
                if (bytesPerSecond === 0) return '0 B/s';
                
                const k = 1024;
                const sizes = ['B/s', 'KB/s', 'MB/s'];
                const i = Math.floor(Math.log(bytesPerSecond) / Math.log(k));
                
                if (i >= sizes.length) i = sizes.length - 1;
                if (i === 0) return bytesPerSecond + ' ' + sizes[i];
                return parseFloat((bytesPerSecond / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }
            
            // 开始轮询下载状态
            function startPollingTaskStatus() {
                if (pollingInterval) {
                    clearInterval(pollingInterval);
                }
                
                console.log('开始轮询任务状态，task_id:', currentTaskId);
                
                pollingInterval = setInterval(async () => {
                    if (!currentTaskId) {
                        console.warn('没有任务ID，停止轮询');
                        stopPolling();
                        return;
                    }
                    
                    try {
                        const response = await fetch(`/api/download/status?task_id=${currentTaskId}`, {
                            method: 'GET',
                            headers: {
                                'Content-Type': 'application/json',
                                'Cache-Control': 'no-cache'
                            }
                        });
                        
                        if (response.ok) {
                            const status = await response.json();
                            console.log('收到状态更新:', status);
                            updateTaskStatus(status);
                        } else {
                            console.error('获取下载状态失败:', response.status);
                            const errorText = await response.text();
                            console.error('错误详情:', errorText);
                            
                            // 如果是404，可能是任务不存在
                            if (response.status === 404) {
                                showStatus('任务不存在或已过期', 'error');
                                updateStatusLight('error');
                                stopPolling();
                            }
                        }
                    } catch (error) {
                        console.error('轮询错误:', error);
                        // 网络错误时继续尝试，不停止轮询
                    }
                }, 1000); // 每秒轮询一次
            }
            
            // 更新任务状态显示
            function updateTaskStatus(status) {
                // 更新任务ID
                taskIdEl.textContent = status.task_id ? status.task_id.substring(0, 12) + '...' : '-';
                
                // 更新任务状态显示
                if (status.error) {
                    // 错误状态
                    taskStatusEl.textContent = '错误: ' + status.error;
                    updateStatusLight('error');
                    stopPolling();
                    return;
                }
                
                // 根据后端返回的状态更新UI
                if (status.is_downloading) {
                    taskStatusEl.textContent = '下载中';
                    updateStatusLight('downloading', true);
                } else if (status.is_finished) {
                    if (status.is_success) {
                        taskStatusEl.textContent = '下载成功';
                        updateStatusLight('success');
                    } else {
                        taskStatusEl.textContent = '下载失败';
                        updateStatusLight('error');
                    }
                    
                    // 下载完成后停止轮询
                    setTimeout(() => {
                        stopPolling();
                    }, 3000); // 3秒后停止轮询
                } else {
                    taskStatusEl.textContent = '等待开始';
                    updateStatusLight('idle');
                }
                
                // 更新已下载字节数
                const downloadedBytes = status.downloaded_bytes || 0;
                downloadedBytesEl.textContent = formatBytes(downloadedBytes);
                
                // 计算下载速度
                const now = Date.now();
                const timeDiff = (now - lastSpeedUpdateTime) / 1000; // 转换为秒
                
                if (timeDiff >= 1) { // 每秒计算一次速度
                    const bytesDiff = downloadedBytes - lastSpeedBytes;
                    const speed = bytesDiff / timeDiff;
                    
                    // 保存到速度历史记录
                    speedHistory.push(speed);
                    if (speedHistory.length > MAX_SPEED_HISTORY) {
                        speedHistory.shift();
                    }
                    
                    // 计算平均速度
                    const avgSpeed = speedHistory.reduce((sum, val) => sum + val, 0) / speedHistory.length;
                    
                    downloadSpeedEl.textContent = formatSpeed(avgSpeed);
                    
                    lastSpeedBytes = downloadedBytes;
                    lastSpeedUpdateTime = now;
                }
                
                lastDownloadedBytes = downloadedBytes;
            }
            
            // 停止轮询
            function stopPolling() {
                if (pollingInterval) {
                    clearInterval(pollingInterval);
                    pollingInterval = null;
                    console.log('停止轮询');
                }
            }
            
            // 重置任务状态显示
            function resetTaskStatus() {
                taskIdEl.textContent = '-';
                downloadedBytesEl.textContent = '0 B';
                downloadSpeedEl.textContent = '0 B/s';
                taskStatusEl.textContent = '未开始';
                
                updateStatusLight('idle');
                
                lastDownloadedBytes = 0;
                lastSpeedBytes = 0;
                lastSpeedUpdateTime = Date.now();
                speedHistory = [];
            }
            
            // 发送内容到服务器
            sendBtn.addEventListener('click', async function() {
                const url = urlInput.value.trim();
                const filename = filenameInput.value.trim();
                
                if (!url) {
                    showStatus('请输入下载链接！', 'error');
                    urlInput.focus();
                    return;
                }
                
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    showStatus('请输入有效的http或https链接！', 'error');
                    urlInput.focus();
                    return;
                }
                
                // 重置状态
                resetTaskStatus();
                showStatus('正在创建下载任务...', 'info');
                
                sendBtn.disabled = true;
                sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发送中...';
                
                try {
                    // 准备请求数据
                    const requestData = {
                        content: url
                    };
                    
                    // 如果用户输入了文件名，添加到请求中
                    if (filename) {
                        requestData.filename = filename;
                    }
                    
                    const response = await fetch('/api/message', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(requestData)
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        // 保存任务ID
                        currentTaskId = data.task_id;
                        taskIdEl.textContent = currentTaskId.substring(0, 12) + '...';
                        
                        showStatus('下载任务已创建，开始监控进度...', 'success');
                        responseContent.textContent = JSON.stringify(data, null, 2);
                        
                        // 更新状态为准备中
                        taskStatusEl.textContent = '任务创建成功';
                        updateStatusLight('downloading', true);
                        
                        // 开始轮询下载状态
                        setTimeout(() => {
                            startPollingTaskStatus();
                        }, 500); // 延迟500ms开始轮询，给服务器一些时间
                    } else {
                        showStatus(`下载失败: ${data.error || '未知错误'}`, 'error');
                        responseContent.textContent = JSON.stringify(data, null, 2);
                        updateStatusLight('error');
                    }
                } catch (error) {
                    showStatus(`连接错误: ${error.message}`, 'error');
                    responseContent.textContent = `连接错误：${error.message}\n\n请确保服务器正在运行！`;
                    updateStatusLight('error');
                } finally {
                    sendBtn.disabled = false;
                    sendBtn.innerHTML = '<i class="fas fa-download"></i> 开始下载';
                }
            });
            
            // 清空内容
            clearBtn.addEventListener('click', function() {
                urlInput.value = '';
                filenameInput.value = '';
                responseContent.textContent = '等待发送请求...';
                statusMessage.style.display = 'none';
                urlInput.focus();
                stopPolling();
                resetTaskStatus();
                currentTaskId = null;
                showStatus('内容已清空', 'success');
            });
            
            // 复制响应内容
            copyBtn.addEventListener('click', function() {
                const text = responseContent.textContent;
                if (text && text !== '等待发送请求...') {
                    navigator.clipboard.writeText(text)
                        .then(() => {
                            const originalText = copyBtn.innerHTML;
                            copyBtn.innerHTML = '<i class="fas fa-check"></i> 已复制';
                            copyBtn.style.background = '#28a745';
                            setTimeout(() => {
                                copyBtn.innerHTML = originalText;
                                copyBtn.style.background = '';
                            }, 2000);
                        })
                        .catch(err => {
                            console.error('复制失败:', err);
                            showStatus('复制失败，请手动复制', 'error');
                        });
                } else {
                    showStatus('没有内容可复制', 'error');
                }
            });
            
            // 显示状态消息
            function showStatus(message, type) {
                statusMessage.textContent = message;
                statusMessage.className = `status-message ${type}`;
                statusMessage.style.display = 'block';
                
                // 3秒后自动隐藏
                setTimeout(() => {
                    statusMessage.style.display = 'none';
                }, 3000);
            }
            
            // 页面加载完成后显示欢迎信息
            setTimeout(() => {
                showStatus('欢迎使用音乐下载器！请填写下载链接和自定义文件名', 'info');
            }, 1000);
            
            // 页面卸载时停止轮询
            window.addEventListener('beforeunload', function() {
                stopPolling();
            });
            
            // 添加键盘快捷键支持
            urlInput.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.key === 'Enter') {
                    sendBtn.click();
                }
            });
            
            filenameInput.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.key === 'Enter') {
                    sendBtn.click();
                }
            });
        });
    </script>
</body>
</html>
