<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单HTTP服务器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: #2c3e50;
            color: white;
            padding: 25px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 30px;
        }
        
        .input-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 16px;
        }
        
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            min-height: 150px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        button {
            flex: 1;
            padding: 16px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        button i {
            font-size: 18px;
        }
        
        #sendBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        #sendBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        #clearBtn {
            background: #f5f5f5;
            color: #666;
            border: 2px solid #e0e0e0;
        }
        
        #clearBtn:hover {
            background: #e0e0e0;
        }
        
        .response-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
        }
        
        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .response-header h3 {
            color: #2c3e50;
        }
        
        #copyBtn {
            background: #28a745;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
        }
        
        #copyBtn:hover {
            background: #218838;
        }
        
        #responseContent {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            min-height: 80px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
            color: #333;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            display: none;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .server-info {
            background: #e8f4fd;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            border-left: 4px solid #2196f3;
        }
        
        .server-info h3 {
            color: #1976d2;
            margin-bottom: 10px;
        }
        
        .server-info p {
            color: #555;
            line-height: 1.6;
        }
        
        @media (max-width: 600px) {
            .container {
                border-radius: 10px;
            }
            
            .content {
                padding: 20px;
            }
            
            .button-group {
                flex-direction: column;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖥️ 嵌入式HTTP服务器</h1>
            <p>发送内容到服务器并获取响应</p>
        </div>
        
        <div class="content">
            <div class="input-group">
                <label for="contentInput">
                    <i class="fas fa-paste"></i> 粘贴或输入内容：
                </label>
                <textarea 
                    id="contentInput" 
                    placeholder="在这里粘贴或输入要发送的内容...&#10;例如：Hello from client!"
                    autofocus
                ></textarea>
            </div>
            
            <div class="button-group">
                <button id="sendBtn">
                    <i class="fas fa-paper-plane"></i> 发送到服务器
                </button>
                <button id="clearBtn">
                    <i class="fas fa-eraser"></i> 清空内容
                </button>
            </div>
            
            <div class="status" id="statusMessage"></div>
            
            <div class="response-section">
                <div class="response-header">
                    <h3><i class="fas fa-server"></i> 服务器响应</h3>
                    <button id="copyBtn">
                        <i class="far fa-copy"></i> 复制响应
                    </button>
                </div>
                <div id="responseContent">
                    等待发送请求...
                </div>
            </div>
            
            <div class="server-info">
                <h3><i class="fas fa-info-circle"></i> 服务器信息</h3>
                <p>
                    • 这是一个运行在嵌入式Linux上的HTTP服务器<br>
                    • 使用C++编写，支持POST请求处理<br>
                    • 支持跨域请求(CORS)<br>
                    • 返回JSON格式的响应数据
                </p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const contentInput = document.getElementById('contentInput');
            const sendBtn = document.getElementById('sendBtn');
            const clearBtn = document.getElementById('clearBtn');
            const copyBtn = document.getElementById('copyBtn');
            const responseContent = document.getElementById('responseContent');
            const statusMessage = document.getElementById('statusMessage');
            
            // 自动检测粘贴内容
            contentInput.addEventListener('paste', function(e) {
                setTimeout(() => {
                    showStatus('内容已粘贴，可以点击发送按钮', 'success');
                }, 100);
            });
            
            // 发送内容到服务器
            sendBtn.addEventListener('click', async function() {
                const content = contentInput.value.trim();
                
                if (!content) {
                    showStatus('请输入或粘贴内容后再发送！', 'error');
                    return;
                }
                
                showStatus('正在发送请求到服务器...', 'success');
                sendBtn.disabled = true;
                sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发送中...';
                
                try {
                    const response = await fetch('/api/message', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            content: content,
                            timestamp: new Date().toISOString(),
                            client: 'web_browser'
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        showStatus('请求成功！服务器已响应', 'success');
                        responseContent.textContent = JSON.stringify(data, null, 2);
                    } else {
                        showStatus(`请求失败: ${data.error || '未知错误'}`, 'error');
                        responseContent.textContent = JSON.stringify(data, null, 2);
                    }
                } catch (error) {
                    showStatus(`连接错误: ${error.message}`, 'error');
                    responseContent.textContent = `连接错误：${error.message}\n\n请确保服务器正在运行！`;
                } finally {
                    sendBtn.disabled = false;
                    sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i> 发送到服务器';
                }
            });
            
            // 清空内容
            clearBtn.addEventListener('click', function() {
                contentInput.value = '';
                responseContent.textContent = '等待发送请求...';
                statusMessage.style.display = 'none';
                contentInput.focus();
                showStatus('内容已清空', 'success');
            });
            
            // 复制响应内容
            copyBtn.addEventListener('click', function() {
                const text = responseContent.textContent;
                if (text && text !== '等待发送请求...') {
                    navigator.clipboard.writeText(text)
                        .then(() => {
                            const originalText = copyBtn.innerHTML;
                            copyBtn.innerHTML = '<i class="fas fa-check"></i> 已复制';
                            copyBtn.style.background = '#28a745';
                            setTimeout(() => {
                                copyBtn.innerHTML = originalText;
                                copyBtn.style.background = '';
                            }, 2000);
                        })
                        .catch(err => {
                            console.error('复制失败:', err);
                            showStatus('复制失败，请手动复制', 'error');
                        });
                } else {
                    showStatus('没有内容可复制', 'error');
                }
            });
            
            // 显示状态消息
            function showStatus(message, type) {
                statusMessage.textContent = message;
                statusMessage.className = `status ${type}`;
                statusMessage.style.display = 'block';
                
                // 3秒后自动隐藏
                setTimeout(() => {
                    statusMessage.style.display = 'none';
                }, 3000);
            }
            
            // 页面加载完成后显示欢迎信息
            setTimeout(() => {
                showStatus('欢迎使用嵌入式HTTP服务器！', 'success');
            }, 1000);
        });
    </script>
</body>
</html>
